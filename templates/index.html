<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Sistema de Apoio a Intercambistas</title>
</head> 
<body>
    
<header>
    <h1 id="logo">
        <a href="{{ url_for('home') }}">SAI</a>
    </h1>

    <nav>
        <ul>
            <li><a href="{{ url_for('home') }}">Início</a></li>
            <li><a href="#recursos">Recursos</a></li>
            <li><a href="#comunidade">Comunidade</a></li>
            <li><a href="#suporte">Suporte</a></li>
        </ul>

    <div class="auth-buttons">
        <a href="{{ url_for('login') }}" class="btn-entrar">Entrar</a>

<main>
    <div class="banner-principal">
        <img src="{{ url_for('static', filename='fotos/young-friends-park.jpg') }}" alt="banner principal do sai">

            <h1>Sua jornada internacional começa aqui.</h1>
            <p>O apoio que você precisa para viver a melhor experiência de intercâmbio sem preocupações.</p>
            <a href="{{ url_for('cadastro') }}" class="botao-acao">Começar Agora</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 SAI - Sistema de Apoio a Intercambistas.</p>
    </footer>
