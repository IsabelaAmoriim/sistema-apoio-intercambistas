<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- CSS CORRIGIDO -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css'
) }}">
    
    <title>Criar Conta - SAI</title>
</head> 
<body>
    
    <header>
        <h1 id="logo">
            <a href="{{ url_for('home') }}">SAI</a>
        </h1>

            <nav>
                <ul>
                    <li><a href="{{ url_for('home') }}">Início</a></li>
                    <li><a href="{{ url_for('home') }}#recursos">Recursos</a></li>
                    <li><a href="{{ url_for('home') }}#comunidade">Comunidade</a></li>
                    <li><a href="{{ url_for('home') }}#suporte">Suporte</a></li>
                </ul>
            </nav>

        <div class="auth-buttons">
            <a href="{{ url_for('login') }}" class="btn-entrar">Entrar</a>
            <a href="{{ url_for('cadastro') }}" class="btn-criar">Criar Conta</a>
        </div>
    </header>

    <main class="main-login-cadastro">
        <div class="card-formulario">
            <h2>Crie sua conta</h2>
            <p style="margin-bottom: 20px; color: #666;">
                Junte-se à nossa comunidade.
            </p>
            
            <form action="{{ url_for('cadastro') }}" method="POST">

                {% if sucesso %}
                <div class="mensagem-sucesso">
                    Cadastro realizado com sucesso!
                </div>
                {% endif %}

                {% if erro %}
                <div class="mensagem-alerta">
                    Este e-mail já está cadastrado!
                </div>
                {% endif %}

                <input type="text" name="nome" class="form-input" placeholder="Nome Completo" required>
                <input type="text" name="cpf" class="form-input" placeholder="CPF (somente números)" maxlength="11" required>
                <input type="email" name="email" class="form-input" placeholder="Seu melhor E-mail" required>
                <input type="password" name="senha" class="form-input" placeholder="Crie uma Senha" required>
                
                <button type="submit" class="btn-submit">Cadastrar</button>
            </form>

            <a href="{{ url_for('login') }}" class="link-extra">
                Já tem uma conta? Faça login.
            </a>
        </div>
    </main>

</body>
</html>
