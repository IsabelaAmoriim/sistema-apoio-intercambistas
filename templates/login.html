<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Entrar - SAI</title>
</head> 
<body>
    
    <header>
        <h1 id="logo"><a href="index.html">SAI</a></h1>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="/#recursos">Recursos</a></li>
                <li><a href="/#comunidade">Comunidade</a></li>
                <li><a href="/#suporte">Suporte</a></li>
            </ul>
        </nav>
        <div class="auth-buttons">
            <a href="login.html" class="btn-entrar">Entrar</a>
            <a href="cadastro.html" class="btn-criar">Criar Conta</a>
        </div>
    </header>

    <main class="main-login-cadastro">
        <div class="card-formulario">
            <h2>Bem-vindo de volta!</h2>
            
            <form action="/login" method="POST">
                <div class="mensagem-alerta" style="display: none;">
    Usuário ou senha incorretos!
</div>
                <input type="email" name="email" class="form-input" placeholder="Seu E-mail" required>
                <input type="password" name="senha" class="form-input" placeholder="Sua Senha" required>
                
                <button type="submit" class="btn-submit">Entrar</button>
            </form>

            <a href="cadastro.html" class="link-extra">Ainda não tem conta? Crie agora.</a>
        </div>
    </main>

</body>
</html>
