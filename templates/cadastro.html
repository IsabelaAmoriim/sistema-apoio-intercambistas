<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Criar Conta - SAI</title>
</head> 
<body>
    
    <header>
        <h1 id="logo"><a href="index.html">SAI</a></h1>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="/#recursos">Recursos</a></li>
                <li><a href="/#comunidade">Comunidade</a></li>
                <li><a href="/#suporte">Suporte</a></li>
            </ul>
        </nav>
        <div class="auth-buttons">
            <a href="login.html" class="btn-entrar">Entrar</a>
            <a href="cadastro.html" class="btn-criar">Criar Conta</a>
        </div>
    </header>

    <main class="main-login-cadastro">
        <div class="card-formulario">
            <h2>Crie sua conta</h2>
            <p style="margin-bottom: 20px; color: #666;">Junte-se à nossa comunidade.</p>
            
            <form action="/cadastro" method="POST">
                <input type="text" name="nome" class="form-input" placeholder="Nome Completo" required>
                <input type="text" name="cpf" class="form-input" placeholder="CPF (somente números)" maxlength="11" required>
                <input type="email" name="email" class="form-input" placeholder="Seu melhor E-mail" required>
                <input type="password" name="senha" class="form-input" placeholder="Crie uma Senha" required>
                
                <button type="submit" class="btn-submit">Cadastrar</button>
            </form>

            <a href="login.html" class="link-extra">Já tem uma conta? Faça login.</a>
        </div>
    </main>

</body>
</html>
